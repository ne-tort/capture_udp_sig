# Slot capture policy — live capture only (no Architect / synth fillers).
schema_version: 2
description: >
  I1–I5 come only from live capture. Missing optional slots stay empty.
  Bundled defaults are fixed snapshots in config/signatures.default.json
  (refreshed from output/live_*.json).

profiles:
  dns:
    capture_slots: [i1, i2, i3, i4, i5]
    source: dig / live DNS query+responses
  sip:
    capture_slots: [i1, i2]
    source: SIP OPTIONS + response
  sip_multi:
    capture_slots: [i1, i2, i3, i4, i5]
    source: multi-round SIP OPTIONS
  dtls:
    capture_slots: [i1, i2, i3, i4]
    source: openssl DTLS handshake
  ntp:
    capture_slots: [i1, i2, i3]
    source: NTP client poll + replies
  quic:
    capture_slots: [i1, i2, i3, i4, i5]
    source: browser QUIC UDP chain
  quic_browser:
    capture_slots: [i1, i2, i3, i4, i5]
    source: Chromium + tcpdump QUIC
  quic_tls_browser:
    capture_slots: [i1, i2, i3, i4, i5]
    source: TLS ClientHello + QUIC UDP
  stun:
    capture_slots: [i1, i2]
    source: STUN Binding (i2 if response seen)
  stun_browser:
    capture_slots: [i1, i2]
    source: Chromium WebRTC STUN
  webrtc:
    capture_slots: [i1]
    source: WebRTC ICE Binding request only
