# Signature-lab capture policy: required vs optional I slots per profile.
schema_version: 2
description: Slot policy for strict merge (omit empty slots, no silent Architect).

profiles:
  dns:
    required_slots: [i1]
    optional_slots: [i2, i3, i4, i5]
    max_slots: 5
    capture_timeout_sec: 12
    capture_slots: [hex]
    notes: I1 from live dig; I2-I5 from distinct DNS responses when captured.

  sip:
    required_slots: [i1]
    optional_slots: [i2, i3, i4, i5]
    max_slots: 2
    capture_timeout_sec: 15
    capture_slots: [hex, i2]
    notes: Single client OPTIONS; I2=server 200 OK when present.

  sip_multi:
    required_slots: [i1]
    optional_slots: [i2, i3, i4, i5]
    max_slots: 5
    capture_timeout_sec: 18
    capture_slots: [hex, i2]
    notes: 3 client OPTIONS rounds — out,in,out,in,out; I5 may be out-only.

  dtls:
    required_slots: [i1]
    optional_slots: [i2, i3, i4, i5]
    max_slots: 4
    capture_timeout_sec: 18
    capture_slots: [hex, i2]
    notes: Client-initiated DTLS handshake to 1.1.1.1:853; out/in alternation.

  quic:
    required_slots: [i1]
    optional_slots: [i2, i3, i4, i5]
    max_slots: 5
    capture_timeout_sec: 30
    capture_slots: [hex, i2, i3, i4, i5]

  quic_browser:
    required_slots: [i1]
    optional_slots: [i2, i3, i4, i5]
    max_slots: 5
    capture_timeout_sec: 30
    capture_slots: [hex, i2, i3, i4, i5]

  quic_tls_browser:
    required_slots: [i1]
    optional_slots: [i2, i3, i4, i5]
    max_slots: 5
    capture_timeout_sec: 30
    capture_slots: [hex, i2, i3, i4, i5]
    notes: I1=TCP TLS ClientHello; I2-I5=QUIC UDP chain (alt-svc).

  stun_browser:
    required_slots: [i1]
    optional_slots: [i2, i3, i4, i5]
    max_slots: 2
    capture_timeout_sec: 15
    capture_slots: [hex, i2]
    notes: I2 STUN response when server replies; I3-I5 never from browser STUN.

  stun:
    required_slots: [i1]
    optional_slots: [i2, i3, i4, i5]
    max_slots: 2
    capture_timeout_sec: 15
    capture_slots: [hex, i2]

  webrtc:
    required_slots: [i1]
    optional_slots: [i2, i3, i4, i5]
    max_slots: 1
    capture_timeout_sec: 15
    capture_slots: [hex, i2]
    notes: use_response=false; only outbound STUN Binding (I1).

  ntp:
    required_slots: [i1]
    optional_slots: [i2, i3, i4, i5]
    max_slots: 3
    capture_timeout_sec: 10
    capture_slots: [hex]
    notes: NTP client polls (default 2); I1/I3=out mode-3, I2=in mode-4.
