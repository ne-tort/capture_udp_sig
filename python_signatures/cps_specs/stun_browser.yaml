# STUN Binding Request/Response CPS mapping (RFC 5389)
# Bytes 0-7: fixed header (type, length, magic cookie)
# Bytes 8-19: transaction ID (12 bytes) -> random per session
slots:
  i1:
    - { offset: 0, length: 8, kind: static }
    - { offset: 8, length: 12, kind: random_bytes }
  i2:
    - { offset: 0, length: 8, kind: static }
    - { offset: 8, length: 12, kind: random_bytes }
